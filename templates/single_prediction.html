<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediction Result</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#312e81);
    overflow:hidden;
}

/* Background Glow */
body::before{
    content:'';
    position:absolute;
    width:350px;
    height:350px;
    background:#00e5ff;
    border-radius:50%;
    top:-120px;
    left:-120px;
    filter:blur(140px);
}

body::after{
    content:'';
    position:absolute;
    width:350px;
    height:350px;
    background:#8b5cf6;
    border-radius:50%;
    bottom:-120px;
    right:-120px;
    filter:blur(140px);
}

.container{
    position:relative;
    z-index:1;
    width:700px;
    padding:50px;
    text-align:center;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

.icon{
    font-size:80px;
    margin-bottom:15px;
}

.title{
    font-size:42px;
    font-weight:bold;
    background:linear-gradient(90deg,#00f5ff,#3b82f6,#8b5cf6);
    -webkit-background-clip:text;
    color:transparent;
}

.subtitle{
    color:#cbd5e1;
    margin-top:10px;
    margin-bottom:30px;
}

.result-box{
    background:rgba(255,255,255,0.08);
    padding:30px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.1);
}

.result-label{
    color:#00e5ff;
    font-size:20px;
    margin-bottom:10px;
}

.result{
    color:white;
    font-size:36px;
    font-weight:700;
}

.back-btn{
    display:inline-block;
    margin-top:30px;
    text-decoration:none;
    padding:14px 30px;
    border-radius:12px;
    color:white;
    font-weight:bold;
    background:linear-gradient(90deg,#06b6d4,#3b82f6,#8b5cf6);
    transition:.3s;
}

.back-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 0 25px #3b82f6;
}

.footer{
    margin-top:25px;
    color:#94a3b8;
    font-size:14px;
}

</style>
</head>
<body>

<div class="container">

    <div class="icon">🩺</div>

    <div class="title">Prediction Result</div>

    <div class="subtitle">
        Machine Learning Analysis Completed Successfully
    </div>

    <div class="result-box">

        <div class="result-label">
            Patient Status
        </div>

        <div class="result">
            {{ result }}
        </div>

    </div>

    <a href="/" class="back-btn">
        🔄 Predict Again
    </a>

    <div class="footer">
        Powered by Flask • Python • Machine Learning
    </div>

</div>

</body>
</html>
