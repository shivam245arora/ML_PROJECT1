<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#312e81);
    overflow:hidden;
}

/* Glowing circles */
body::before{
    content:'';
    position:absolute;
    width:350px;
    height:350px;
    background:#00e5ff;
    border-radius:50%;
    top:-120px;
    left:-120px;
    filter:blur(130px);
}

body::after{
    content:'';
    position:absolute;
    width:350px;
    height:350px;
    background:#8b5cf6;
    border-radius:50%;
    bottom:-120px;
    right:-120px;
    filter:blur(130px);
}

.container{
    position:relative;
    z-index:1;
    text-align:center;
    padding:50px;
    width:700px;
    border-radius:25px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

h1{
    font-size:55px;
    margin-bottom:20px;
    background:linear-gradient(90deg,#00f5ff,#3b82f6,#8b5cf6);
    -webkit-background-clip:text;
    color:transparent;
}

p{
    color:#d1d5db;
    font-size:20px;
    margin-bottom:35px;
}

.btn{
    display:inline-block;
    text-decoration:none;
    padding:15px 35px;
    font-size:18px;
    font-weight:bold;
    border-radius:12px;
    background:linear-gradient(90deg,#06b6d4,#3b82f6,#8b5cf6);
    color:white;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 0 25px #3b82f6;
}

.icon{
    font-size:70px;
    margin-bottom:15px;
}

</style>
</head>
<body>

<div class="container">

    <div class="icon">🤖</div>

    <h1>Welcome</h1>

    <p>
        Welcome to the AI-Powered Diabetes Prediction System.
        Analyze patient health data and get instant predictions
        using Machine Learning.
    </p>

    <a href="/predictdata" class="btn">
        🚀 Start Prediction
    </a>

</div>

</body>
</html>
