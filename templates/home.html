<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Diabetes Predictor</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
    135deg,
    #0f172a,
    #1e293b,
    #312e81
    );
    overflow-x:hidden;
}

/* Floating circles */

body::before{
    content:'';
    position:absolute;
    width:300px;
    height:300px;
    background:#00e5ff;
    border-radius:50%;
    top:-100px;
    left:-100px;
    filter:blur(120px);
}

body::after{
    content:'';
    position:absolute;
    width:300px;
    height:300px;
    background:#7c3aed;
    border-radius:50%;
    bottom:-100px;
    right:-100px;
    filter:blur(120px);
}

.container{
    position:relative;
    z-index:10;
    width:900px;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 15px 35px rgba(0,0,0,0.4);
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:42px;
    background:linear-gradient(
    90deg,
    #00f5ff,
    #38bdf8,
    #8b5cf6
    );
    -webkit-background-clip:text;
    color:transparent;
}

.header p{
    color:#d1d5db;
    margin-top:10px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

.input-box{
    display:flex;
    flex-direction:column;
}

.input-box label{
    color:white;
    margin-bottom:6px;
    font-size:14px;
}

.input-box input{
    padding:14px;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.1);
    color:white;
    font-size:15px;
    transition:.3s;
}

.input-box input::placeholder{
    color:#cbd5e1;
}

.input-box input:focus{
    outline:none;
    transform:translateY(-2px);
    box-shadow:0 0 20px #00e5ff;
}

.predict-btn{
    width:100%;
    margin-top:25px;
    padding:15px;
    border:none;
    border-radius:15px;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    color:white;
    background:linear-gradient(
    90deg,
    #06b6d4,
    #3b82f6,
    #8b5cf6
    );
    transition:.4s;
}

.predict-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 0 30px #3b82f6;
}

.result-card{
    margin-top:30px;
    background:rgba(255,255,255,0.08);
    border-radius:15px;
    padding:25px;
    text-align:center;
}

.result-title{
    color:#00f5ff;
    font-size:18px;
}

.result{
    color:white;
    margin-top:10px;
    font-size:28px;
    font-weight:700;
}

.stats{
    display:flex;
    justify-content:space-between;
    margin-bottom:30px;
    gap:15px;
}

.stat{
    flex:1;
    text-align:center;
    background:rgba(255,255,255,0.08);
    padding:15px;
    border-radius:15px;
}

.stat h3{
    color:#00e5ff;
}

.stat p{
    color:white;
}

.footer{
    text-align:center;
    color:#cbd5e1;
    margin-top:25px;
}

@media(max-width:900px){

.container{
    width:95%;
}

.grid{
    grid-template-columns:1fr;
}

.stats{
    flex-direction:column;
}
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🩺 AI Diabetes Predictor</h1>
        <p>Machine Learning Based Healthcare Risk Analysis</p>
    </div>

    <div class="stats">
        <div class="stat">
            <h3>⚡ Fast</h3>
            <p>Instant Results</p>
        </div>

        <div class="stat">
            <h3>🤖 AI</h3>
            <p>ML Prediction</p>
        </div>

        <div class="stat">
            <h3>📊 Smart</h3>
            <p>Health Analytics</p>
        </div>
    </div>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

        <div class="grid">

            <div class="input-box">
                <label>Pregnancies</label>
                <input type="number" name="Pregnancies" required>
            </div>

            <div class="input-box">
                <label>Glucose</label>
                <input type="number" name="Glucose" required>
            </div>

            <div class="input-box">
                <label>Blood Pressure</label>
                <input type="number" name="BloodPressure" required>
            </div>

            <div class="input-box">
                <label>Skin Thickness</label>
                <input type="number" name="SkinThickness" required>
            </div>

            <div class="input-box">
                <label>Insulin</label>
                <input type="number" name="Insulin" required>
            </div>

            <div class="input-box">
                <label>BMI</label>
                <input type="number" step="0.1" name="BMI" required>
            </div>

            <div class="input-box">
                <label>Diabetes Pedigree Function</label>
                <input type="number" step="0.01" name="DiabetesPedigreeFunction" required>
            </div>

            <div class="input-box">
                <label>Age</label>
                <input type="number" name="Age" required>
            </div>

        </div>

        <button class="predict-btn" type="submit">
            🚀 Predict Diabetes Risk
        </button>

    </form>

    {% if result %}
    <div class="result-card">
        <div class="result-title">Prediction Result</div>
        <div class="result">{{ result }}</div>
    </div>
    {% endif %}

    <div class="footer">
        Powered by Flask • Machine Learning • Python
    </div>

</div>

</body>
</html>
